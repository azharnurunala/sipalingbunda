backend:
  name: github
  repo: azharnurunala/sipalingbunda
  branch: main

media_folder: "images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Kategori", name: "category", widget: "string" }
      - { label: "Ringkasan", name: "excerpt", widget: "text" }
      - { label: "Isi Artikel", name: "body", widget: "markdown" }
